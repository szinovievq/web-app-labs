{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 500px;">
    <div class="card-body text-center p-5">
        <h2 class="card-title mb-4">Счетчик посещений</h2>
        <div class="display-1 text-primary mb-3">{{ count }}</div>
        <p class="text-muted">Столько раз вы заходили на эту страницу.</p>
        <a href="{{ url_for('counter') }}" class="btn btn-outline-primary">Обновить страницу</a>
    </div>
</div>
{% endblock %}
