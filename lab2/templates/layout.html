<!DOCTYPE html>
<html lang="ru" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лаб 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link:hover { background-color: rgba(255,255,255,0.1); border-radius: 5px; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        footer { background: #f8f9fa; border-top: 1px solid #dee2e6; }
    </style>
</head>

<body class="bg-light d-flex flex-column h-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Лабораторная работа №2</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/url-params' %}active fw-bold text-white{% endif %}"
                           href="/url-params?course=2&group=241-326">URL</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/headers' %}active fw-bold text-white{% endif %}"
                           href="/headers">Headers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/cookies' %}active fw-bold text-white{% endif %}"
                           href="/cookies">Cookies</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active fw-bold text-white{% endif %}"
                           href="/">Form</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/phone' %}active fw-bold text-white{% endif %}"
                           href="/phone">Phone Check</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container flex-shrink-0">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer mt-auto py-4 text-center">
        <div class="container">
            <span class="text-muted">Работу выполнил студент группы 241-326 Зиновьев Сергей Владимирович</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
