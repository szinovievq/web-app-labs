{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-primary">Проверка номера телефона</h3>
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <input type="text" name="phone" value="{{ phone_raw }}"
                               class="form-control form-control-lg {% if error_msg %}is-invalid{% endif %}"
                               placeholder="+7 (900) 123-45-67">
                        {% if error_msg %}
                            <div class="invalid-feedback">{{ error_msg }}</div>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Проверить номер</button>
                </form>

                {% if formatted_phone %}
                <div class="mt-4 alert alert-info text-center border-0 shadow-sm">
                    <small class="text-uppercase fw-bold text-muted d-block mb-1">Результат</small>
                    <span class="h3">{{ formatted_phone }}</span>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
