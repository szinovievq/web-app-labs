{% extends "base.html" %}
{% from "macros.html" import render_user_form %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Редактирование пользователя</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('edit_user', user_id=user_id) }}">
                    {{ render_user_form(roles, errors, form_data, is_edit=True) }}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
